name: Crypto CI

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    paths:
      - "crates/crypto/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/crypto-ci.yml"
  pull_request:
    paths:
      - "crates/crypto/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/crypto-ci.yml"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ---------------------------------------------------------------------------
  # Test — run all unit and integration tests
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run tests
        run: cargo test --workspace --verbose

  # ---------------------------------------------------------------------------
  # Lint — clippy with deny on all warnings
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Audit — check for known vulnerabilities in dependencies
  # ---------------------------------------------------------------------------
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  # ---------------------------------------------------------------------------
  # Coverage — enforce minimum code coverage threshold
  # ---------------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cov-

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run coverage
        run: cargo tarpaulin --workspace --fail-under 90 --verbose --out xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: cobertura.xml

  # ---------------------------------------------------------------------------
  # Fuzz — nightly scheduled fuzzing (30 min per target)
  # ---------------------------------------------------------------------------
  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    # Run nightly at 03:00 UTC, or on manual dispatch
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Cache fuzz corpus
        uses: actions/cache@v4
        with:
          path: crates/crypto/fuzz/corpus
          key: ${{ runner.os }}-fuzz-corpus-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-fuzz-corpus-

      - name: Fuzz fuzz_decrypt (30 min)
        run: |
          cd crates/crypto/fuzz
          cargo +nightly fuzz run fuzz_decrypt -- -max_total_time=1800
        continue-on-error: false

      - name: Fuzz fuzz_kdf (30 min)
        run: |
          cd crates/crypto/fuzz
          cargo +nightly fuzz run fuzz_kdf -- -max_total_time=1800
        continue-on-error: false

      - name: Fuzz fuzz_nonce (30 min)
        run: |
          cd crates/crypto/fuzz
          cargo +nightly fuzz run fuzz_nonce -- -max_total_time=1800
        continue-on-error: false

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: crates/crypto/fuzz/artifacts/


